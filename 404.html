<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página No Encontrada | INDUAGUA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a2332;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 520px; }
        .code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #14b8a6, #0d6e6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 1rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.6;
            margin-bottom: 32px;
        }
        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #14b8a6;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #0f8a8a;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(20, 184, 166, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Página No Encontrada</h1>
        <p>La página que busca no existe o fue movida. Regrese a nuestra página principal para encontrar lo que necesita.</p>
        <a href="/">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Ir al Inicio
        </a>
    </div>
</body>
</html>
